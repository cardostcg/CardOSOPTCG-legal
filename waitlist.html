<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardOS — One Piece TCG Portfolio Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0E1A;
      color: #E8EAF0;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: rgba(55, 138, 221, 0.15);
      border: 1px solid rgba(55, 138, 221, 0.4);
      color: #378ADD;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 700;
      line-height: 1.15;
      max-width: 580px;
      margin-bottom: 16px;
    }

    h1 span { color: #5DCAA5; }

    p {
      font-size: clamp(15px, 2.5vw, 18px);
      color: #8A8FA8;
      max-width: 440px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .cta {
      display: inline-block;
      background: #378ADD;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 12px;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .cta:hover { background: #2a6bb5; }
    .cta:active { transform: scale(0.97); }

    footer {
      position: fixed;
      bottom: 20px;
      font-size: 12px;
      color: #4A4F66;
    }

    footer a { color: #4A4F66; text-decoration: underline; }
    footer a:hover { color: #8A8FA8; }
  </style>
</head>
<body>

  <div class="badge">Coming Soon · Android</div>

  <h1>Your One Piece TCG<br /><span>Financial OS.</span></h1>

  <p>Track your collection. Know what it's worth. Built for every player. Built for every pull.</p>

  <a class="cta" href="https://forms.gle/9FaEKYwk9imXY3f27" target="_blank" rel="noopener">
    Join the Waitlist
  </a>

  <footer>
    <a href="https://cardostcg.github.io/CardOSOPTCG-legal/privacy.html">Privacy Policy</a>
    &nbsp;·&nbsp;
    <a href="https://cardostcg.github.io/CardOSOPTCG-legal/tos.html">Terms of Service</a>
  </footer>

</body>
</html>
